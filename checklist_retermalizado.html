
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retermalizado - SAIF Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>
    <script>
        const SAIF_CLOUD = {
            TABLE: 'checklist_retermalizado',
            async save(data) {
                try {
                    const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
                    const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
                    const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
                    const user = JSON.parse(localStorage.getItem('saif_user') || '{}');
                    const record = {
                        ...data,
                        usuario_id: user.id || null,
                        usuario_nombre: user.nombreCompleto || user.username || 'Usuario Externo',
                        sede: user.sede || 'Santiago 1',
                        created_at: new Date().toISOString()
                    };
                    const { error } = await supabase.from(this.TABLE).insert([record]);
                    if (error) throw error;
                    return { success: true };
                } catch (err) {
                    console.error('Error en SAIF Cloud:', err);
                    return { success: false, error: err.message };
                }
            }
        };

        // Modificar función guardar
        const _origGuardarRet = guardar;
        guardar = async function() {
            if(!validado){toast('⚠️ Debes validar el registro antes de guardar','#854F0B');return;}
            
            // 1. Ejecutar lógica original (local)
            _origGuardarRet();

            // 2. Obtener el último registro y subir a la nube
            if(hist.length > 0) {
                const entry = hist[0];
                console.log("☁️ Sincronizando Retermalizado con la nube...");
                const cloudRes = await SAIF_CLOUD.save(entry);
                if(cloudRes.success) {

                } else {
                    toast('⚠️ Error al subir a la nube','#854F0B');
                }
            }
        };
    </script>
</body>
</html>
