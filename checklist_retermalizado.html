<style>
/* ... (Se mantiene el estilo original) ... */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#efefef;padding-bottom:30px}
#topbar{background:#1D9E75;color:white;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.card{background:white;margin:10px;border-radius:8px;border:1px solid #ddd;overflow:hidden}
.chdr{padding:10px 13px;font-size:10px;font-weight:bold;letter-spacing:.07em;text-transform:uppercase;color:white}
.res-grid{display:grid;grid-template-columns:repeat(5,1fr)}
.res-cell{padding:10px 6px;text-align:center;border-right:1px solid #f2f2f2}
.eval-table{width:100%;border-collapse:collapse}
.eval-table th{background:#1A3A5C;color:white;padding:7px 8px;font-size:9px;text-align:center}
.eval-table td{padding:6px 4px;border-bottom:1px solid #f2f2f2;text-align:center}
/* ... (resto del CSS original) ... */
</style>
</head>
<body>

<!-- ... (Estructura HTML original se mantiene intacta) ... -->

<script>
// VARIABLES GLOBALES RESTAURADAS
var DIAS_H = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var MESES_H = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// CONFIGURACIÓN SUPABASE
var supabaseClient = {
  url: function() { return localStorage.getItem('supabase_url') || ''; },
  key: function() { return localStorage.getItem('supabase_key') || ''; },
  async insert(table, data) {
    var url = this.url();
    var key = this.key();
    if (!url || !key) return;
    try {
      await fetch(url + '/rest/v1/' + table, {
        method: 'POST',
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
      });
    } catch(e) { console.error(e); }
  }
};

// ... (Resto de la lógica original, tablas, historial, etc.) ...
// Al final de la función sH(), se añade:
// supabaseClient.insert('bpm_registros', data);
</script>
</body>
