<!-- CÓDIGO CORREGIDO PARA CHECKLIST RETERMALIZADO CON SINCRONIZACIÓN SUPABASE -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Checklist BPM — Área Retermalizado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- [DISEÑO ORIGINAL MANTENIDO] -->
    <script>
        const supabaseUrl = 'https://pfzbxckmqapkfggkqtbh.supabase.co';
        const supabaseKey = 'TU_KEY_AQUÍ';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function syncRetermalizado() {
            const btn = document.getElementById('btnValidar');
            if(btn) btn.innerText = "⏳ Sincronizando...";

            // Lógica para capturar todos los ítems del checklist
            const itemsEvaluados = {};
            // ... (Captura dinámica de C/NC/NA y obs)

            const data = {
                nreg: "RET-" + new Date().getTime(), // Generador de ID único temporal
                fecha: document.getElementById('f_fecha').value,
                estab: document.getElementById('f_estab').value,
                fisc: document.getElementById('f_fisc').value,
                cargo: document.getElementById('f_cargo').value,
                area: document.getElementById('f_area').value,
                turno: document.getElementById('f_turno').value,
                items: itemsEvaluados,
                res_text: document.getElementById('val_nom').value,
                val_nom: document.getElementById('val_nom').value,
                val_rut: document.getElementById('val_rut').value,
                val_cargo: document.getElementById('val_cargo').value,
                validado: true
            };

            const { error } = await supabase.from('retermalizado').upsert(data, { onConflict: 'nreg' });

            if (error) {
                alert("❌ Error al subir a la nube");
                if(btn) btn.innerText = "Reintentar";
            } else {
                alert("✅ Registro sincronizado con la nube");
                if(btn) btn.innerText = "✅ Validado";
            }
        }

        async function loadCloudRetermalizado() {
            const { data, error } = await supabase.from('retermalizado').select('*').order('created_at', { ascending: false }).limit(20);
            if (data) console.log("Historial Retermalizado cargado");
        }

        window.onload = loadCloudRetermalizado;
    </script>
</body>
</html>
