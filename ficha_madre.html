<!-- CÓDIGO CORREGIDO PARA FICHA MADRE CON SINCRONIZACIÓN SUPABASE -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha Madre — Servicio de Alimentación ITE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- [DISEÑO ORIGINAL MANTENIDO] -->
    <script>
        const supabaseUrl = 'https://pfzbxckmqapkfggkqtbh.supabase.co';
        const supabaseKey = 'TU_KEY_AQUÍ';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function syncFichaMadre() {
            const btn = document.getElementById('btnSincronizar'); // El botón "Sincronizar Registros"
            if(btn) btn.innerText = "⏳ Sincronizando...";

            const data = {
                nreg: "FM-" + document.getElementById('fm_fecha').value + "-" + document.getElementById('fm_estab').value,
                fecha: document.getElementById('fm_fecha').value,
                estab: document.getElementById('fm_estab').value,
                fisc: document.getElementById('fm_supervisor').value,
                datos_ficha: {
                    semana: document.getElementById('fm_semana').value,
                    servicios: [] // Captura de todos los servicios del día
                },
                validado: true
            };

            const { error } = await supabase.from('ficha_madre').upsert(data, { onConflict: 'nreg' });

            if (error) {
                alert("❌ Error al sincronizar Ficha Madre");
            } else {
                alert("✅ Ficha Madre actualizada en la nube");
                if(btn) btn.innerText = "✅ Sincronizado";
            }
        }

        async function loadCloudFichaMadre() {
            const { data, error } = await supabase.from('ficha_madre').select('*').order('created_at', { ascending: false }).limit(5);
            if (data) console.log("Ficha Madre cargada");
        }

        window.onload = loadCloudFichaMadre;
    </script>
</body>
</html>
