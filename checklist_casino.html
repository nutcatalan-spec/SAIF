<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAIF · Fiscalización BPM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: #EEF3FF; color: #0D1B4B; margin: 0; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 16px rgba(13,27,75,0.1); }
.header-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
.header-table td { border: 1px solid #C8D8F8; padding: 10px; font-size: 13px; }
.header-title { font-size: 18px; font-weight: bold; color: #1A3A8C; text-align: center; }
.meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; background: #F5F8FF; padding: 15px; border-radius: 8px; border: 1px solid #E2ECFF; }
.meta-item { display: flex; flex-direction: column; }
.meta-item label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #6B7FA8; margin-bottom: 4px; }
.meta-item input, .meta-item select { padding: 8px 12px; border: 1.5px solid #C8D8F8; border-radius: 6px; font-size: 13px; color: #0D1B4B; outline: none; background: white; }
.meta-item input:focus, .meta-item select:focus { border-color: #1A6EF5; }
.block-sec { margin-bottom: 30px; border: 1px solid #C8D8F8; border-radius: 8px; overflow: hidden; background: white; }
.block-toggle { background: #1A3A8C; color: white; padding: 12px 15px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.block-toggle:hover { background: #142E70; }
.block-content { padding: 15px; }
.eval-table { width: 100%; border-collapse: collapse; }
.eval-table th { background: #F0F4FC; color: #1A3A8C; text-align: left; padding: 10px; font-size: 12px; font-weight: 700; border-bottom: 2px solid #C8D8F8; }
.eval-table td { padding: 10px; border-bottom: 1px solid #E2ECFF; font-size: 13px; vertical-align: middle; }
.col-num { width: 40px; text-align: center; font-weight: bold; color: #6B7FA8; }
.col-crit { width: 45%; font-weight: 500; }
.col-opts { width: 160px; text-align: center; }
.col-obs { width: 35%; }
.opt-btn { border: 1.5px solid #C8D8F8; background: white; padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; margin: 0 2px; border-radius: 4px; color: #6B7FA8; transition: all 0.2s; }
.opt-btn[data-val="1"]:hover, .opt-btn[data-val="1"].active { background: #28A745; color: white; border-color: #28A745; }
.opt-btn[data-val="0"]:hover, .opt-btn[data-val="0"].active { background: #DC3545; color: white; border-color: #DC3545; }
.opt-btn[data-val="NA"]:hover, .opt-btn[data-val="NA"].active { background: #6C757D; color: white; border-color: #6C757D; }
.obs-input { width: 100%; padding: 6px 10px; border: 1px solid #C8D8F8; border-radius: 4px; font-size: 12px; box-sizing: border-box; outline: none; }
.obs-input:focus { border-color: #1A6EF5; }
.summary-bar { background: #0D1B4B; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 15px; box-shadow: 0 4px 12px rgba(13,27,75,0.2); }
.score-badge { background: #1A6EF5; padding: 6px 14px; border-radius: 20px; font-size: 16px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
.action-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
.btn { border: none; padding: 14px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
.btn-primary { background: #1A6EF5; color: white; box-shadow: 0 4px 12px rgba(26,110,245,0.3); }
.btn-primary:hover { background: #0D52C7; transform: translateY(-1px); }
.btn-secondary { background: #6B7FA8; color: white; }
.btn-secondary:hover { background: #52648B; }
.hist-sec { background: white; border: 1px solid #C8D8F8; border-radius: 8px; padding: 20px; }
.hist-title { font-size: 15px; font-weight: bold; color: #1A3A8C; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #E2ECFF; }
.hist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #F0F4FC; font-size: 13px; }
.hist-item:last-child { border-bottom: none; }
.hist-meta { color: #6B7FA8; font-size: 12px; }
.hist-score { font-weight: bold; padding: 3px 8px; border-radius: 4px; }
.score-high { background: #D4EDDA; color: #155724; }
.score-mid { background: #FFF3CD; color: #856404; }
.score-low { background: #F8D7DA; color: #721C24; }
</style>
</head>
<body>
<div class="container">
<table class="header-table">
<tr>
<td style="width:25%; text-align:center;"><strong style="color:#1A3A8C;">SANTIAGO 1</strong><br><span style="font-size:11px; color:#6B7FA8;">Inspección Técnica de Explotación</span></td>
<td class="header-title">CHECKLIST DE FISCALIZACIÓN DE BUENAS PRÁCTICAS DE MANUFACTURA (BPM)</td>
<td style="width:25%; font-size:11px; line-height:1.4;"><strong>Código:</strong> ITE-BPM-CAS<br><strong>Versión:</strong> 3.0<br><strong>Vigencia:</strong> 2026</td>
</tr>
</table>
<div class="meta-grid">
<div class="meta-item"><label>N° Registro</label><input type="text" id="fi_nreg" readonly style="background:#E2ECFF; font-weight:bold; color:#1A3A8C;"></div>
<div class="meta-item"><label>Fecha Evaluación</label><input type="date" id="fi_fecha"></div>
<div class="meta-item"><label>Instalación / Casino</label><select id="fi_instalacion"><option value="Casino Central">Casino Central</option><option value="Cocina General">Cocina General</option><option value="Rancho Imputados">Rancho Imputados</option><option value="Bodega de Insumos">Bodega de Insumos</option></select></div>
<div class="meta-item"><label>Turno / Servicio</label><select id="fi_turno"><option value="Desayuno">Desayuno</option><option value="Almuerzo">Almuerzo</option><option value="Cena">Cena</option><option value="General">Control General</option></select></div>
</div>
<div id="dynamicBlocks"></div>
<div class="summary-bar">
<div>Cumplimiento Global (BPM): <span id="lblCumplimiento">0.0%</span></div>
<div class="score-badge" id="lblTotales">Cumple: 0 | No Cumple: 0 | N/A: 0</div>
</div>
<div class="action-panel">
<button class="btn btn-primary" id="hBtnGuardar">Guardar Registro y Nube</button>
<button class="btn btn-secondary" onclick="resetFormulario()">Limpiar Planilla</button>
</div>
<div class="hist-sec">
<div class="hist-title">Historial Reciente de Controles (Locales)</div>
<div id="histContainer"></div>
</div>
</div>
<script>
const CONFIG_ESTRUCTURA = [
{
titulo: "1. Infraestructura y Condiciones Estructurales del Casino",
items: [
"Paredes, pisos y cielos limpios, sin grietas y con pintura en buen estado.",
"Sistemas de drenaje y canaletas limpias, con rejillas metálicas y sin olores.",
"Puertas y ventanas con cierre hermético y mallas anti-insectos intactas.",
"Iluminación suficiente, con luminarias protegidas contra estallidos.",
"Ventilación adecuada, ausencia de condensación de vapor y hongos."
]
},
{
titulo: "2. Higiene del Personal y Hábitos Operacionales",
items: [
"Personal con uniforme completo, limpio, de color claro y cofia/gorro.",
"Uso riguroso de mascarilla y guantes cuando la operación lo requiera.",
"Uñas cortas, limpias, sin esmalte; ausencia de joyas, relojes o anillos.",
"Lavado de manos frecuente y correcto con jabón desinfectante y aire/papel.",
"Ausencia de heridas expuestas o síntomas de enfermedades transmisibles."
]
},
{
titulo: "3. Operaciones de Almacenamiento y Materias Primas",
items: [
"Materias primas rotuladas, vigentes y ordenadas según criterio PEPS.",
"Alimentos almacenados en tarimas o estantes separados del suelo y paredes.",
"Separación estricta de alimentos crudos y cocidos (prevención cruzada).",
"Productos químicos de aseo guardados en bodegas cerradas e independientes.",
"Temperaturas de congelación (-18°C) y refrigeración (0°C a 5°C) en rango."
]
},
{
titulo: "4. Higienización, Equipos y Utensilios de Cocina",
items: [
"Equipos, mesones y utensilios limpios, desinfectados y de material inerte.",
"Uso correcto de tablas de picar coloreadas según el tipo de alimento.",
"Ausencia de paños de tela de uso común (sustituidos por papel desechable).",
"Basureros con tapa de pedal, bolsa plástica y con retiro frecuente.",
"Evidencias de un control de plagas vigente y trampas operativas."
]
}
];

var histBPM = [];
var respuestasBPM = {};
var observacionesBPM = {};

window.onload = function() {
initFecha();
renderEstructura();
gHist();
renderHist();
initNreg();
};

function initFecha() {
var d = new Date();
var m = "" + (d.getMonth() + 1), j = "" + d.getDate(), y = d.getFullYear();
if (m.length < 2) m = "0" + m; if (j.length < 2) j = "0" + j;
document.getElementById("fi_fecha").value = [y, m, j].join("-");
}

function initNreg() {
var yr = new Date().getFullYear();
var key = "bpm_nreg_" + yr;
var last = 0;
try { var v = localStorage.getItem(key); if(v) last = parseInt(v)||0; } catch(e){}
last++;
var pad = last < 10 ? "000" + last : last < 100 ? "00" + last : last < 1000 ? "0" + last : "" + last;
document.getElementById("fi_nreg").value = yr + "-" + pad;
}

function renderEstructura() {
var box = document.getElementById("dynamicBlocks");
box.innerHTML = "";
var globalIdx = 1;
CONFIG_ESTRUCTURA.forEach(function(sec, sIdx) {
var div = document.createElement("div");
div.className = "block-sec";
var html = '<div class="block-toggle" onclick="toggleSec(' + sIdx + ')"><span>' + sec.titulo + '</span><span id="tglSign_' + sIdx + '">▼</span></div>';
html += '<div class="block-content" id="tglCont_' + sIdx + '">';
html += '<table class="eval-table"><thead><tr><th class="col-num">N°</th><th class="col-crit">Criterio de Evaluación BPM</th><th class="col-opts">Evaluación</th><th class="col-obs">Observaciones / Desvíos</th></tr></thead><tbody>';
sec.items.forEach(function(crit) {
var cKey = "c_" + globalIdx;
html += '<tr>';
html += '<td class="col-num">' + globalIdx + '</td>';
html += '<td class="col-crit">' + crit + '</td>';
html += '<td class="col-opts">';
html += '<button class="opt-btn" id="btn_' + cKey + '_1" data-key="' + cKey + '" data-val="1" onclick="setEv(this)">C</button>';
html += '<button class="opt-btn" id="btn_' + cKey + '_0" data-key="' + cKey + '" data-val="0" onclick="setEv(this)">NC</button>';
html += '<button class="opt-btn" id="btn_' + cKey + '_NA" data-key="' + cKey + '" data-val="NA" onclick="setEv(this)">N/A</button>';
html += '</td>';
html += '<td class="col-obs"><input type="text" class="obs-input" id="obs_' + cKey + '" placeholder="Nota de desviación..." onchange="setObs(\'' + cKey + '\', this.value)"></td>';
html += '</tr>';
globalIdx++;
});
html += '</tbody></table></div>';
div.innerHTML = html;
box.appendChild(div);
});
}

function toggleSec(i) {
var el = document.getElementById("tglCont_" + i);
var s = document.getElementById("tglSign_" + i);
if(el.style.display === "none") { el.style.display = "block"; s.textContent = "▼"; }
else { el.style.display = "none"; s.textContent = "►"; }
}

function setEv(btn) {
var key = btn.getAttribute("data-key");
var val = btn.getAttribute("data-val");
["1", "0", "NA"].forEach(function(v) {
document.getElementById("btn_" + key + "_" + v).classList.remove("active");
});
btn.classList.add("active");
respuestasBPM[key] = val;
calcCump();
}

function setObs(k, v) { observacionesBPM[k] = v; }

function calcCump() {
var c = 0, nc = 0, na = 0;
var totalItems = 20; 
for (var i = 1; i <= totalItems; i++) {
var v = respuestasBPM["c_" + i];
if (v === "1") c++; else if (v === "0") nc++; else if (v === "NA") na++;
}
var act = c + nc;
var pct = act > 0 ? ((c / act) * 100).toFixed(1) : "0.0";
document.getElementById("lblCumplimiento").textContent = pct + "%";
document.getElementById("lblTotales").textContent = "Cumple: " + c + " | No Cumple: " + nc + " | N/A: " + na;
return { pct: pct, c: c, nc: nc, na: na };
}

function mkEntry() {
var m = calcCump();
var desvios = [];
for(var k in observacionesBPM){
if(observacionesBPM[k].trim()!=="") desvios.push({ item: k, nota: observacionesBPM[k] });
}
return {
nreg: document.getElementById("fi_nreg").value,
fecha: document.getElementById("fi_fecha").value,
inst: document.getElementById("fi_instalacion").value,
turno: document.getElementById("fi_turno").value,
pct: m.pct,
tot: m.c + m.nc,
na: m.na,
eqs: respuestasBPM,
desvios: desvios
};
}

function gHist() {
try { var data = localStorage.getItem("saif_hist_bpm"); if(data) histBPM = JSON.parse(data); } catch(e){}
}
function sHist() {
try { localStorage.setItem("saif_hist_bpm", JSON.stringify(histBPM)); } catch(e){}
}

function renderHist() {
var container = document.getElementById("histContainer");
container.innerHTML = "";
if(histBPM.length === 0) { container.innerHTML = '<div style="color:#6B7FA8; font-size:12px; text-align:center; padding:10px;">No hay registros locales evaluados.</div>'; return; }
histBPM.forEach(function(h) {
var div = document.createElement("div");
div.className = "hist-item";
var cls = h.pct >= 90 ? "score-high" : h.pct >= 75 ? "score-mid" : "score-low";
div.innerHTML = '<div><strong>' + h.nreg + '</strong> - ' + h.inst + ' (' + h.turno + ')<br><span class="hist-meta">' + h.fecha + '</span></div><div class="hist-score ' + cls + '">' + h.pct + '%</div>';
container.appendChild(div);
});
}

function resetFormulario() {
respuestasBPM = {}; observacionesBPM = {};
renderEstructura();
calcCump();
initFecha();
initNreg();
}
</script>

<script>
const SAIF_CLOUD = {
    TABLE: 'bpm_modulos',
    async save(data) {
        try {
            const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
            const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
            const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
            
            // Obtener sesión del index principal
            const user = JSON.parse(localStorage.getItem('saif_u') || '{}');
            
            // Estructurar fila exacta para la tabla bpm_modulos
            const record = {
                fn_rut: user.username || 'Externo',
                fn_cargo: user.rol ? user.rol.toUpperCase() : 'ITE',
                fn_emp: 'Santiago 1 - ' + data.inst,
                res_text: 'Control BPM de Turno: ' + data.turno + '. Porcentaje de cumplimiento global: ' + data.pct + '%.',
                eqs: data.eqs || {}, 
                desvios: data.desvios || {},
                created_at: new Date().toISOString()
            };
            
            const { error } = await supabase.from(this.TABLE).insert([record]);
            if (error) throw error;
            return { success: true };
        } catch (err) {
            console.error('Error en Supabase:', err);
            return { success: false, error: err.message };
        }
    }
};

// Enganchar el guardado local con la Nube sin romper la planilla
(function(){
    var btnGuardar = document.getElementById("hBtnGuardar");
    if(btnGuardar) {
        btnGuardar.onclick = async function() {
            var entry = mkEntry();
            
            // Validar que se haya respondido algo
            var respondidos = Object.keys(respuestasBPM).length;
            if(respondidos === 0) {
                alert("❌ Evalúa al menos un parámetro de la lista antes de guardar.");
                return;
            }
            
            // 1. Guardar de forma Local (Historial de abajo)
            histBPM.unshift(entry);
            if(histBPM.length > 30) histBPM = histBPM.slice(0,30);
            sHist();
            renderHist();
            
            // 2. GUARDAR EN LA NUBE (Sincronización Supabase)
            btnGuardar.disabled = true;
            btnGuardar.textContent = "Sincronizando con Nube...";
            
            const cloudRes = await SAIF_CLOUD.save(entry);
            
            btnGuardar.disabled = false;
            btnGuardar.textContent = "Guardar Registro y Nube";
            
            if(cloudRes.success) {
                alert("✅ Registro guardado localmente y respaldado exitosamente en la nube de Supabase.");
            } else {
                alert("⚠️ Guardado localmente, pero falló el respaldo en la nube: " + cloudRes.error);
            }
            
            // 3. Auto-incrementar el correlativo anual (Lógica original)
            var yr = new Date().getFullYear();
            var key = "bpm_nreg_" + yr;
            var last = 0;
            try { var v = localStorage.getItem(key); if(v) last = parseInt(v)||0; } catch(e){}
            last++;
            try { localStorage.setItem(key, last); } catch(e){}
            
            // Limpiar formulario para la siguiente fiscalización
            resetFormulario();
        };
    }
})();
</script>
</body>
</html>
