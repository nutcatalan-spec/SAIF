<!-- CÓDIGO CORREGIDO PARA TRAZABILIDAD CON SINCRONIZACIÓN SUPABASE -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio de Trazabilidad — E.P. Santiago 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- [DISEÑO ORIGINAL MANTENIDO] -->
    <script>
        const supabaseUrl = 'https://pfzbxckmqapkfggkqtbh.supabase.co';
        const supabaseKey = 'TU_KEY_AQUÍ';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function syncTrazabilidad() {
            const btn = document.getElementById('btnGuardar');
            if(btn) btn.innerText = "⏳ Sincronizando...";

            const data = {
                nreg: document.getElementById('nro-registro').value,
                fecha: document.getElementById('fecha-reg').value,
                hora: document.getElementById('hora-reg').value,
                regimen: document.getElementById('regimen-reg').value,
                preparacion: document.getElementById('nombre-prep').value,
                responsable: document.getElementById('responsable').value,
                servicio: document.getElementById('servicio').value,
                proceso: document.getElementById('proceso-display').value,
                estab: document.querySelector('input[value="E.P. Santiago 1"]').value,
                // Datos complejos se guardan como JSON
                recepcion_data: {}, 
                sanitizacion_data: {},
                produccion_data: {},
                obs: document.querySelector('textarea').value,
                validado: true
            };

            const { error } = await supabase.from('trazabilidad').upsert(data, { onConflict: 'nreg' });

            if (error) {
                alert("❌ Error al subir a la nube");
                if(btn) btn.innerText = "Reintentar";
            } else {
                alert("✅ Trazabilidad sincronizada con la nube");
                if(btn) btn.innerText = "✅ Guardado";
            }
        }

        async function loadCloudTrazabilidad() {
            const { data, error } = await supabase.from('trazabilidad').select('*').order('created_at', { ascending: false }).limit(10);
            if (data) console.log("Historial Trazabilidad cargado");
        }

        window.onload = loadCloudTrazabilidad;
    </script>
</body>
</html>
