
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Trazabilidad - SAIF Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>
    <script>
        const SAIF_CLOUD = {
            TABLE: 'trazabilidad',
            async save(data) {
                try {
                    const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
                    const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
                    const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
                    const user = JSON.parse(localStorage.getItem('saif_user') || '{}');
                    const record = {
                        data: data, // Guardamos el objeto completo como JSON
                        fecha: data.fecha || new Date().toISOString().split('T')[0],
                        nreg: data.nreg || '',
                        usuario_nombre: user.nombreCompleto || user.username || 'Usuario Externo',
                        sede: user.sede || 'Santiago 1',
                        created_at: new Date().toISOString()
                    };
                    const { error } = await supabase.from(this.TABLE).insert([record]);
                    if (error) throw error;
                    return { success: true };
                } catch (err) {
                    console.error('Error en SAIF Cloud:', err);
                    return { success: false, error: err.message };
                }
            }
        };

        // Modificar el botón de guardado (asumiendo lógica estándar de SAIF)
        async function guardarRegistroNube(data) {
            console.log("☁️ Sincronizando Trazabilidad con la nube...");
            const res = await SAIF_CLOUD.save(data);
            if(res.success) alert("✅ Registro guardado en la nube.");
            else alert("⚠️ Error al subir a la nube.");
        }
    </script>
</body>
</html>
