<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ejercicio de Trazabilidad — E.P. Santiago 1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --azul: #0B3D6B;
  --azul-medio: #155A9A;
  --azul-claro: #E8F0F8;
  --verde: #1A6B3C;
  --verde-claro: #E6F4EC;
  --rojo: #C0392B;
  --rojo-claro: #FDECEA;
  --naranja: #D35400;
  --naranja-claro: #FEF0E6;
  --gris-fondo: #F4F6F9;
  --gris-borde: #D0D7E2;
  --gris-texto: #4A5568;
  --blanco: #FFFFFF;
  --sombra: 0 2px 8px rgba(11,61,107,0.10);
  --radio: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gris-fondo); color: #1a2233; font-size: 14px; }

/* HEADER */
.header {
  background: var(--azul);
  color: #fff;
  padding: 14px 20px 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 4px solid var(--verde);
}

.header-titulo { flex: 1; }
.header-titulo h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; line-height: 1.3; text-transform: uppercase; }
.header-titulo p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

/* CONTENEDOR */
.container { max-width: 860px; margin: 0 auto; padding: 16px 12px 40px; }

/* TARJETA */
.card {
  background: var(--blanco);
  border-radius: var(--radio);
  border: 1px solid var(--gris-borde);
  box-shadow: var(--sombra);
  margin-bottom: 14px;
  overflow: hidden;
}
.card-header {
  padding: 10px 16px;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.card-header.azul { background: var(--azul); color: #fff; }

/* CAMPOS */
.campo { display: flex; flex-direction: column; gap: 4px; }
.campo label { font-size: 11px; font-weight: 600; color: var(--gris-texto); text-transform: uppercase; letter-spacing: 0.4px; }
.campo input, .campo select, .campo textarea {
  border: 1px solid var(--gris-borde);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 13px;
  background: var(--blanco);
  color: #1a2233;
  width: 100%;
}

/* BOTONES */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.btn {
  padding: 10px 20px;
  border-radius: var(--radio);
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.btn-guardar { background: var(--verde); color: #fff; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: #1a2233;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  z-index: 2000;
}

/* Configuración Supabase flotante */
.supa-cfg{position:fixed;bottom:10px;right:10px;z-index:100;background:rgba(255,255,255,.9);padding:5px;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
.supa-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
.supa-card{background:white;width:90%;max-width:400px;border-radius:12px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.3)}
.supa-card h3{margin-bottom:15px;font-size:16px;color:#1A3A5C}
.supa-card label{display:block;font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;font-weight:bold}
.supa-card input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:15px;font-size:13px}
.supa-card .btns{display:flex;gap:10px}
.supa-card button{flex:1;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.supa-save{background:var(--verde);color:white}
.supa-cancel{background:#eee;color:#555}

</style>
</head>
<body>

<div class="header">
  <div class="header-titulo">
    <h1>Ejercicio de Trazabilidad</h1>
    <p>E.P. Santiago 1 — Inspección Técnica de Explotación</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-header azul">📋 Datos del Registro</div>
    <div class="card-body" style="padding:15px">
      <div class="campo"><label>Nombre Preparación</label><input type="text" id="nombre-prep"></div>
      <div class="campo"><label>Fecha</label><input type="date" id="fecha-reg"></div>
      <div class="campo"><label>Responsable</label><input type="text" id="responsable"></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-guardar" onclick="guardarTraz()">💾 Guardar en Nube y Local</button>
  </div>
</div>

<!-- MODAL SUPABASE CONFIG -->
<div class="supa-cfg" onclick="document.getElementById('supaModal').style.display='flex'">⚙️</div>
<div id="supaModal" class="supa-modal">
  <div class="supa-card">
    <h3>Configuración Supabase</h3>
    <label>URL del Proyecto</label>
    <input type="text" id="supaUrl" placeholder="https://xxxx.supabase.co">
    <label>Anon Public Key</label>
    <input type="text" id="supaKey" placeholder="eyJhbGciOiJIUzI1NiI...">
    <div class="btns">
      <button class="supa-save" onclick="saveSupaCfg()">Guardar</button>
      <button class="supa-cancel" onclick="document.getElementById('supaModal').style.display='none'">Cancelar</button>
    </div>
  </div>
</div>

<script>
const supa = {
    get url() { return localStorage.getItem('supabase_url') || ''; },
    get key() { return localStorage.getItem('supabase_key') || ''; },
    get headers() {
        return {
            'apikey': this.key,
            'Authorization': `Bearer ${this.key}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
        };
    },
    async insert(table, data) {
        if (!this.url || !this.key) throw new Error('Supabase no configurado.');
        const endpoint = `${this.url}/rest/v1/${table}`;
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: this.headers,
            body: JSON.stringify(data)
        });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || 'Error en Supabase');
        }
        return true;
    }
};

function saveSupaCfg() {
    localStorage.setItem('supabase_url', document.getElementById('supaUrl').value.trim());
    localStorage.setItem('supabase_key', document.getElementById('supaKey').value.trim());
    document.getElementById('supaModal').style.display='none';
    alert('✅ Configuración guardada');
}

async function guardarTraz(){
  var r = {
    fecha: document.getElementById("fecha-reg").value,
    nombre_preparacion: document.getElementById("nombre-prep").value,
    responsable: document.getElementById("responsable").value,
    nro_registro: "TRAZ-"+Date.now()
  };
  
  // Local
  var hist = JSON.parse(localStorage.getItem("registros_trazabilidad") || "[]");
  hist.unshift(r);
  localStorage.setItem("registros_trazabilidad", JSON.stringify(hist));
  
  try {
    await supa.insert('registros_trazabilidad', r);
    alert("✅ Guardado en Nube y Local");
  } catch(e) {
    alert("Guardado LOCAL exitoso, pero falló la nube: "+e.message);
  }
}

window.onload = () => {
  document.getElementById("fecha-reg").valueAsDate = new Date();
  document.getElementById("supaUrl").value = localStorage.getItem("supabase_url") || "";
  document.getElementById("supaKey").value = localStorage.getItem("supabase_key") || "";
};
</script>
</body>
</html>
