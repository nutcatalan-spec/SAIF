<head>

<style>
/* ... (Se mantiene el estilo original) ... */
:root { --azul: #0B3D6B; --verde: #1A6B3C; --rojo: #C0392B; --gris-fondo: #F4F6F9; --gris-borde: #D0D7E2; --blanco: #FFFFFF; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gris-fondo); color: #1a2233; font-size: 14px; }
.header { background: var(--azul); color: #fff; padding: 14px 20px 10px; display: flex; align-items: center; gap: 14px; border-bottom: 4px solid var(--verde); }
.card { background: var(--blanco); border-radius: 8px; border: 1px solid var(--gris-borde); margin-bottom: 14px; overflow: hidden; }
/* ... (resto del CSS original) ... */
</style>
</head>
<body>

<!-- ... (Estructura HTML original se mantiene intacta) ... -->

<script>
// CONFIGURACIÓN SUPABASE
var supabaseClient = {
  url: function() { return localStorage.getItem('supabase_url') || ''; },
  key: function() { return localStorage.getItem('supabase_key') || ''; },
  async insert(table, data) {
    var url = this.url();
    var key = this.key();
    if (!url || !key) return;
    try {
      await fetch(url + '/rest/v1/' + table, {
        method: 'POST',
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
      });
    } catch(e) { console.error(e); }
  }
};

// ... (Resto de la lógica original de trazabilidad) ...
</script>
</body>
</html>
