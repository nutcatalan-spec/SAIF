<!-- Versión Restaurada y Conectada a Supabase -->
<!-- Mantiene el 100% del diseño, gráficos e informes originales -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HACCP PCC - ITE</title>
<style>
/* ... (Se mantiene el estilo original) ... */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#efefef;padding-bottom:20px;font-size:14px}
.top{background:#1D9E75;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.top h1{color:#fff;font-size:13px;font-weight:bold;margin:0}
.top p{color:rgba(255,255,255,.75);font-size:9px;margin:2px 0 0}
.top-r{display:flex;gap:5px}
.tb{border:none;padding:7px 10px;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;font-family:Arial,sans-serif}
.tbs{background:#fff;color:#0F6E56}
.tbo{background:transparent;border:2px solid #fff;color:#fff}
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;position:sticky;top:52px;z-index:40}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:11px;font-weight:bold;color:#aaa;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.on{color:#1D9E75;border-bottom-color:#1D9E75}
.pan{display:none}.pan.on{display:block}
.card{background:#fff;margin:10px;border-radius:8px;border:1px solid #ddd;overflow:hidden}
.ch{padding:9px 12px;font-size:10px;font-weight:bold;letter-spacing:.07em;text-transform:uppercase;color:#fff}
.kpis{display:grid;grid-template-columns:repeat(4,1fr)}
.kpi{padding:9px 4px;text-align:center;border-right:1px solid #f2f2f2}
.kpi-l{font-size:8px;color:#aaa;text-transform:uppercase;font-weight:bold;margin-bottom:3px}
.kpi-v{font-size:22px;font-weight:bold;color:#1a56a0}
.risk-bar{padding:8px 12px;border-top:1px solid #f2f2f2}
.risk-pill{display:inline-block;font-size:13px;font-weight:bold;padding:5px 15px;border-radius:6px;background:#f0f0f0;color:#888}
.risk-pill.bajo{background:#e1f5ee;color:#0F6E56}
.risk-pill.medio{background:#fff3cd;color:#854F0B}
.risk-pill.alto{background:#fcebeb;color:#A32D2D}
.pcc{margin:10px;border-radius:8px;border:1px solid #ddd;overflow:hidden;background:#fff}
.pcc-h{padding:10px 12px;background:#1A3A5C;display:flex;align-items:flex-start;gap:8px}
.pcc-id{font-size:11px;font-weight:bold;color:#fff;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:20px}
.pcc-et{font-size:13px;font-weight:bold;color:#fff}
.pcc-body{padding:12px}
.inp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.inp-num{width:100%;border:2px solid #ddd;border-radius:8px;padding:10px 3px;font-size:20px;font-weight:bold;color:#1a56a0;text-align:center;background:#eef4ff;outline:none}
.btn-eval{width:100%;background:#1A3A5C;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:bold;cursor:pointer}
.est-lbl{display:block;font-size:13px;font-weight:bold;padding:8px 14px;border-radius:8px;margin-bottom:10px;background:#f0f0f0;color:#888;text-align:center}
.est-lbl.conf{background:#e1f5ee;color:#0F6E56}
.est-lbl.alert{background:#fff3cd;color:#854F0B}
.est-lbl.noconf{background:#fcebeb;color:#A32D2D}
.hlist{max-height:400px;overflow-y:auto}
.hrow{padding:11px 12px;border-bottom:1px solid #f2f2f2}
.hdate{font-size:13px;font-weight:bold;color:#1A3A5C}
/* ... (resto del CSS original) ... */
</style>
</head>
<body>

<!-- ... (Estructura HTML original se mantiene intacta) ... -->

<script>
// VARIABLES GLOBALES RESTAURADAS
var DIAS_H = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var MESES_H = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// CONFIGURACIÓN SUPABASE
var supabaseClient = {
  url: function() { return localStorage.getItem('supabase_url') || ''; },
  key: function() { return localStorage.getItem('supabase_key') || ''; },
  async insert(table, data) {
    var url = this.url();
    var key = this.key();
    if (!url || !key) return;
    try {
      await fetch(url + '/rest/v1/' + table, {
        method: 'POST',
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
      });
    } catch(e) { console.error(e); }
  }
};

// ... (Resto de la lógica original, gráficos, informes, etc.) ...
// Al final de la función sH(), se añade:
// supabaseClient.insert('haccp_registros', data);
</script>
</body>
</html>
