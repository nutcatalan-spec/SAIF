// VARIABLES GLOBALES RESTAURADAS
var DIAS_H = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var MESES_H = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// CONFIGURACIÓN SUPABASE
var supabaseClient = {
  url: function() { return localStorage.getItem('supabase_url') || ''; },
  key: function() { return localStorage.getItem('supabase_key') || ''; },
  async insert(table, data) {
    var url = this.url();
    var key = this.key();
    if (!url || !key) return;
    try {
      await fetch(url + '/rest/v1/' + table, {
        method: 'POST',
        headers: { 'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(data)
      });
    } catch(e) { console.error(e); }
  }
};

// ... (Resto de la lógica original, gráficos, informes, etc.) ...
