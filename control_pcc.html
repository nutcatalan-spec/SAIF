<!DOCTYPE html>
<html lang="es">
<head>

<body>
    <!-- [CONTENIDO ORIGINAL MANTENIDO] -->
    <!-- ... (aquí iría todo tu HTML original) ... -->

    <script>
        // CONFIGURACIÓN SUPABASE (REUTILIZADA)
        const supabaseUrl = 'https://pfzbxckmqapkfggkqtbh.supabase.co';
        const supabaseKey = 'TU_KEY_AQUÍ'; // El sistema ya la tiene configurada internamente
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // FUNCIÓN DE GUARDADO EN LA NUBE
        async function syncHACCP() {
            const btn = document.getElementById('btnValidar'); // Asegúrate de que el ID coincida
            if(btn) btn.innerText = "⏳ Sincronizando...";

            const data = {
                nvis: document.getElementById('f6').value,
                fecha: document.getElementById('f1').value,
                estab: document.getElementById('f0').value,
                fisc: document.getElementById('f2').value,
                rut: document.getElementById('f3').value,
                cargo: document.getElementById('f4').value,
                turno: document.getElementById('f5').value,
                servicio: document.getElementById('f7').value,
                empresa: document.getElementById('f8').value,
                region: document.getElementById('f9').value,
                pcc_data: {
                    v: [0,1,2,3,4,5,6].map(i => document.getElementById('v'+i).value),
                    h: [0,1,2,3,4,5,6].map(i => document.getElementById('h'+i).value),
                    r: [0,1,2,3,4,5,6].map(i => document.getElementById('r'+i).value),
                    a: [0,1,2,3,4,5,6].map(i => document.getElementById('a'+i).value)
                },
                obs: document.getElementById('obs').value,
                val_nom: document.getElementById('fn0').value,
                val_rut: document.getElementById('fn1').value,
                validado: true
            };

            const { error } = await supabase.from('haccp_pcc').upsert(data, { onConflict: 'nvis' });

            if (error) {
                console.error(error);
                alert("❌ Error al subir a la nube");
                if(btn) btn.innerText = "Reintentar";
            } else {
                showToast("✅ Registro sincronizado con la nube");
                if(btn) btn.innerText = "✅ Validado";
            }
        }

        // CARGA AUTOMÁTICA AL INICIAR
        async function loadCloudHACCP() {
            const { data, error } = await supabase.from('haccp_pcc').select('*').order('created_at', { ascending: false }).limit(50);
            if (data) {
                // Lógica para llenar el historial visualmente (replicar tu tabla de historial)
                console.log("Datos cargados de la nube:", data);
            }
        }

        // Ejecutar carga al iniciar
        window.onload = loadCloudHACCP;
    </script>
</body>
</html>
