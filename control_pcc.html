
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Control PCC (HACCP) - SAIF Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>
    <script>
        const SAIF_CLOUD = {
            TABLE: 'control_pcc',
            async save(data) {
                try {
                    const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
                    const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
                    const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
                    const user = JSON.parse(localStorage.getItem('saif_user') || '{}');
                    const record = {
                        ...data,
                        usuario_id: user.id || null,
                        usuario_nombre: user.nombreCompleto || user.username || 'Usuario Externo',
                        sede: user.sede || 'Santiago 1',
                        created_at: new Date().toISOString()
                    };
                    const { error } = await supabase.from(this.TABLE).insert([record]);
                    if (error) throw error;
                    return { success: true };
                } catch (err) {
                    console.error('Error en SAIF Cloud:', err);
                    return { success: false, error: err.message };
                }
            }
        };

        // Modificar el botón de guardado original
        const _origBGuardar = document.getElementById("bGuardar").onclick;
        document.getElementById("bGuardar").onclick = async function() {
            // Ejecutar lógica original para validaciones
            var ev=0;
            for (var i=0;i<7;i++) { if (ST[i] && ST[i]!=="nd") ev++; }
            if (ev===0) { alert("Complete y evalue al menos un PCC antes de guardar."); return; }

            // Capturar datos
            function gv(id){var e=document.getElementById(id);return e?e.value:"";}
            var co=0, al=0, nc=0;
            for (var i=0;i<7;i++) {
                if (ST[i]==="conf") co++;
                else if (ST[i]==="alert") al++;
                else if (ST[i]==="noconf") nc++;
            }
            var pct = ev>0?Math.round(co/ev*100):0;
            var risk = nc>=2?"ALTO":nc===1?"ALTO":al>=1?"MEDIO":"BAJO";
            
            var pccDataFull=[];
            for(var i=0;i<7;i++){
                pccDataFull.push({ st:ST[i]||"nd", val:VALS[i], hora:gv("h"+i), resp:gv("r"+i), acc:gv("a"+i) });
            }

            const entry = {
                ts:Date.now(),
                fecha:gv("f1"),estab:gv("f0"),fisc:gv("f2"),turno:gv("f5"),
                nvis:gv("f6"),serv:gv("f7"),cargo:gv("f4"),emp:gv("f8"),region:gv("f9"),
                obs:gv("obs"), ev:ev, co:co, al:al, nc:nc, pct:pct, risk:risk,
                pccData:pccDataFull
            };

            // 1. Guardar localmente
            hist.unshift(entry);
            sH(); rH(null);
            autoNreg();

            // 2. Guardar en la nube
            console.log("☁️ Sincronizando PCC con la nube...");
            const cloudRes = await SAIF_CLOUD.save(entry);
            if(cloudRes.success) {
                alert("✅ Registro guardado y sincronizado con la nube.");
            } else {
                alert("⚠️ Guardado localmente, pero hubo un error al subir a la nube.");
            }
        };
    </script>
</body>
</html>
