
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Control Temperatura ITE - SAIF Cloud</title>
    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* Reutilizamos los estilos originales del usuario para mantener la interfaz idéntica */
        /* ... (Estilos abreviados para brevedad, se mantendrán los originales en el archivo final) ... */
    </style>
</head>
<body>
    <!-- Se mantiene el HTML original del usuario -->
    
    <script>
        // CONFIGURACIÓN SAIF CLOUD
        const SAIF_CLOUD = {
            TABLE: 'control_temperatura',
            async save(data) {
                try {
                    const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
                    const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
                    const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);

                    // Obtener usuario desde localStorage (compartido con index.html)
                    const user = JSON.parse(localStorage.getItem('saif_user') || '{}');
                    
                    const record = {
                        ...data,
                        usuario_id: user.id || null,
                        usuario_nombre: user.nombreCompleto || user.username || 'Usuario Externo',
                        sede: user.sede || 'Santiago 1',
                        created_at: new Date().toISOString()
                    };

                    const { error } = await supabase.from(this.TABLE).insert([record]);
                    if (error) throw error;
                    return { success: true };
                } catch (err) {
                    console.error('Error en SAIF Cloud:', err);
                    return { success: false, error: err.message };
                }
            }
        };

        // Modificamos la función guardar original para incluir la nube
        async function guardar(){
            var e = mkEntry(); // Función original que arma el objeto
            if(!e.fecha){ toast("⚠️ Ingresa la fecha before guardar","#854F0B"); return; }
            
            // 1. Guardar localmente (como siempre)
            cfHist.unshift(e);
            saveH();
            
            // 2. GUARDAR EN LA NUBE (NUEVO)
            toast("☁️ Guardando en la nube...", "#1A6EF5");
            const cloudRes = await SAIF_CLOUD.save(e);
            
            if(cloudRes.success) {
                toast("✅ Sincronizado con la nube", "#0F6E56");
            } else {
                toast("⚠️ Error de sincronización, pero guardado localmente", "#854F0B");
            }

            // Continuar con la lógica original de UI
            renderHist(null);
            bloquearBtnValidar(true);
            toast("✅ Registro validado y guardado","#0F6E56");
        }
    </script>
</body>
</html>
