<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Fiscalización BPM - SAIF Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* Estilos originales del usuario */
    </style>
</head>
<body>
    <script>
        // CONFIGURACIÓN SAIF CLOUD (CORREGIDO)
        const SAIF_CLOUD = {
            TABLE: 'bpm_modulos', // <- Apunta a la tabla real de Supabase
            async save(data) {
                try {
                    const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
                    const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
                    const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
                    
                    // Obtener al usuario activo de la sesión del index
                    const user = JSON.parse(localStorage.getItem('saif_u') || '{}');
                    
                    // Estructuramos el registro para que coincida con tu Supabase
                    const record = {
                        fn_rut: user.username || 'Externo',
                        fn_cargo: user.rol ? user.rol.toUpperCase() : 'ITE',
                        fn_emp: 'Santiago 1',
                        res_text: 'Sincronización automática de planilla de evaluación.',
                        eqs: data.eqs || {}, 
                        desvios: data.desvios || {},
                        created_at: new Date().toISOString()
                    };
                    
                    const { error } = await supabase.from(this.TABLE).insert([record]);
                    if (error) throw error;
                    return { success: true };
                } catch (err) {
                    console.error('Error en SAIF Cloud:', err);
                    return { success: false, error: err.message };
                }
            }
        };

        // Modificamos el evento de guardado original
        (function(){
            var _bx = document.getElementById("hBtnGuardar");
            if(_bx) {
                var _origOnClick = _bx.onclick;
                
                _bx.onclick = async function() {
                    var entry = typeof mkEntry === 'function' ? mkEntry() : { tot: 1, na: 0 };
                    
                    // 1. GUARDAR EN LA NUBE
                    console.log("☁️ Sincronizando BPM con la nube...");
                    const cloudRes = await SAIF_CLOUD.save(entry);
                    
                    if(cloudRes.success) {
                        alert("✅ Registro guardado y sincronizado con Supabase exitosamente.");
                    } else {
                        alert("⚠️ Error de sincronización: " + cloudRes.error);
                    }
                    
                    // 2. Ejecutar lógica original de guardado (Auto-incrementar nreg y localStorage local)
                    if (typeof _origOnClick === 'function') {
                        _origOnClick.call(this);
                    } else {
                        // Respaldo de lógica de numeración si el original no responde
                        var yr = new Date().getFullYear();
                        var key = "bpm_nreg_" + yr;
                        var last = 0;
                        try { var v = localStorage.getItem(key); if(v) last = parseInt(v)||0; } catch(e){}
                        last++;
                        var pad = last<10?"000"+last:last<100?"00"+last:last<1000?"0"+last:""+last;
                        var el = document.getElementById("fi_nreg");
                        if(el) el.value = yr+"-"+pad;
                        try { localStorage.setItem(key,last); } catch(e){}
                    }
                };
            }
        })();
    </script>
</body>
</html>
