
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Fiscalización BPM - SAIF Cloud</title>
    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* Estilos originales del usuario */
    </style>
</head>
<body>
    <!-- HTML original del usuario -->

    <script>
        // CONFIGURACIÓN SAIF CLOUD
        const SAIF_CLOUD = {
            TABLE: 'bpm_fiscalizacion',
            async save(data) {
                try {
                    const SUPA_URL = "https://pfzbxckmqapkfggkqtbh.supabase.co";
                    const SUPA_KEY = "sb_publishable_M1niH_fsa5YWGvwwCTAqjA_SJD5Omi7";
                    const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY);
                    const user = JSON.parse(localStorage.getItem('saif_user') || '{}');
                    const record = {
                        ...data,
                        usuario_id: user.id || null,
                        usuario_nombre: user.nombreCompleto || user.username || 'Usuario Externo',
                        sede: user.sede || 'Santiago 1',
                        created_at: new Date().toISOString()
                    };
                    const { error } = await supabase.from(this.TABLE).insert([record]);
                    if (error) throw error;
                    return { success: true };
                } catch (err) {
                    console.error('Error en SAIF Cloud:', err);
                    return { success: false, error: err.message };
                }
            }
        };

        // Modificamos el evento de guardado original
        (function(){
            var _bx = document.getElementById("hBtnGuardar");
            if(_bx) {
                // Guardamos el original para llamarlo después si es necesario
                var _origOnClick = _bx.onclick;
                
                _bx.onclick = async function() {
                    var entry = mkEntry();
                    if(entry.tot===0 && entry.na===0){ alert("Evalua al menos un parametro antes de guardar."); return; }
                    
                    // 1. Guardar localmente
                    histBPM.unshift(entry);
                    if(histBPM.length>60) histBPM=histBPM.slice(0,60);
                    sHist(); addToAnual(entry); renderHist(null);
                    
                    // 2. GUARDAR EN LA NUBE (NUEVO)
                    console.log("☁️ Sincronizando BPM con la nube...");
                    const cloudRes = await SAIF_CLOUD.save(entry);
                    
                    if(cloudRes.success) {
                        alert("✅ Registro guardado localmente y sincronizado con la nube.");
                    } else {
                        alert("⚠️ Registro guardado localmente, pero hubo un error al subirlo a la nube.");
                    }
                    
                    // Auto-incrementar nreg (lógica original)
                    var yr = new Date().getFullYear();
                    var key = "bpm_nreg_"+yr;
                    var last = 0;
                    try { var v = localStorage.getItem(key); if(v) last = parseInt(v)||0; } catch(e){}
                    last++;
                    var pad = last<10?"000"+last:last<100?"00"+last:last<1000?"0"+last:""+last;
                    var el = document.getElementById("fi_nreg");
                    if(el) el.value = yr+"-"+pad;
                    try { localStorage.setItem(key,last); } catch(e){}
                };
            }
        })();
    </script>
</body>
</html>
